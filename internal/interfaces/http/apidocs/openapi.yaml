components:
  parameters:
    TenantHeader:
      name: X-Tenant-ID
      in: header
      required: false
      description: Optional tenant context header surfaced by the health endpoint.
      schema:
        type: string
    OrganizationTenantHeader:
      name: X-Tenant-ID
      in: header
      required: true
      description: Required tenant context header for organization-scoped routes. Must match the target organization ID.
      schema:
        type: string
    OrganizationID:
      name: organizationID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserID:
      name: userID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VendorID:
      name: vendorID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RequestID:
      name: requestID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ItemID:
      name: itemID
      in: path
      required: true
      schema:
        type: string
        format: uuid
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: string
    HealthResponse:
      type: object
      additionalProperties: false
      required: [name, environment, version, status]
      properties:
        name:
          type: string
        environment:
          type: string
        version:
          type: string
        status:
          type: string
          example: ok
        tenant_id:
          type: string
    RegisterRequest:
      type: object
      additionalProperties: false
      required: [email, password, full_name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        full_name:
          type: string
          minLength: 1
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
    SessionResponse:
      type: object
      additionalProperties: false
      required: [access_token, token_type, expires_at, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserResponse'
    UserResponse:
      type: object
      additionalProperties: false
      required: [id, email, full_name, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        is_active:
          type: boolean
        last_login_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UserSummaryResponse:
      type: object
      additionalProperties: false
      required: [id, email, full_name, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateOrganizationRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
    UpdateOrganizationRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
        slug:
          type: string
    OrganizationResponse:
      type: object
      additionalProperties: false
      required: [id, name, slug, created_by_user_id, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        created_by_user_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        archived_at:
          type: string
          format: date-time
    MembershipResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - organization_id
        - user_id
        - role
        - status
        - created_by_user_id
        - invited_at
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum:
            - owner
            - admin
            - requester
            - approver
            - procurement_officer
            - viewer
        status:
          type: string
          enum:
            - invited
            - active
            - suspended
            - removed
        created_by_user_id:
          type: string
          format: uuid
        invited_at:
          type: string
          format: date-time
        activated_at:
          type: string
          format: date-time
        suspended_at:
          type: string
          format: date-time
        removed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OrganizationDetailsResponse:
      type: object
      additionalProperties: false
      required: [organization, membership]
      properties:
        organization:
          $ref: '#/components/schemas/OrganizationResponse'
        membership:
          $ref: '#/components/schemas/MembershipResponse'
    UserOrganizationResponse:
      type: object
      additionalProperties: false
      required: [organization, role, status]
      properties:
        organization:
          $ref: '#/components/schemas/OrganizationResponse'
        role:
          type: string
          enum:
            - owner
            - admin
            - requester
            - approver
            - procurement_officer
            - viewer
        status:
          type: string
          enum:
            - invited
            - active
            - suspended
            - removed
    ListOrganizationsResponse:
      type: object
      additionalProperties: false
      required: [organizations]
      properties:
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/UserOrganizationResponse'
    CreateMembershipRequest:
      type: object
      additionalProperties: false
      required: [role]
      anyOf:
        - required: [user_id]
        - required: [email]
      properties:
