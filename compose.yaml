services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: procureflow-api:local
    container_name: procureflow-api
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-docker}
      APP_HTTP_ADDRESS: ${APP_HTTP_ADDRESS:-:8080}
      APP_TENANT_HEADER: ${APP_TENANT_HEADER:-X-Tenant-ID}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
    ports:
      - "8080:8080"
    restart: unless-stopped

  migrate:
    image: procureflow-api:local
    container_name: procureflow-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-docker}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
    entrypoint: ["/app/procureflow-migrate"]
    command: ["up"]
    restart: "no"

  postgres:
    image: postgres:18-alpine
    container_name: procureflow-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:?DB_USER is required} -d ${DB_NAME:?DB_NAME is required}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
