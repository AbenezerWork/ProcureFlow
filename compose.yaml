services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: procureflow-api:local
    container_name: procureflow-api
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: docker
      APP_HTTP_ADDRESS: :8080
      APP_TENANT_HEADER: X-Tenant-ID
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: procureflow
      DB_PASSWORD: procureflow
      DB_NAME: procureflow
      DB_SSLMODE: disable
    ports:
      - "8080:8080"
    restart: unless-stopped

  migrate:
    image: procureflow-api:local
    container_name: procureflow-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: procureflow
      DB_PASSWORD: procureflow
      DB_NAME: procureflow
      DB_SSLMODE: disable
    entrypoint: ["/app/procureflow-migrate"]
    command: ["up"]
    restart: "no"

  postgres:
    image: postgres:18-alpine
    container_name: procureflow-postgres
    environment:
      POSTGRES_DB: procureflow
      POSTGRES_USER: procureflow
      POSTGRES_PASSWORD: procureflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procureflow -d procureflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
